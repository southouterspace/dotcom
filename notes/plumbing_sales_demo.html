<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plumbing Services - Interactive Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: #2563eb;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            max-width: 80%;
        }
        
        .agent-message {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            margin-right: auto;
        }
        
        .user-message {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            margin-left: auto;
        }
        
        .options {
            margin: 15px 0;
        }
        
        .option-button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 12px 15px;
            background: white;
            border: 2px solid #2563eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .option-button:hover {
            background: #2563eb;
            color: white;
        }
        
        .customer-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }
        
        .customer-info h4 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .info-item {
            margin: 5px 0;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .restart-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
        }
        
        .restart-btn:hover {
            background: #c82333;
        }
        
        .progress-bar {
            background: #e9ecef;
            height: 6px;
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #2563eb;
            height: 100%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Plumbing Services</h1>
            <p>Interactive Service Selection & Information Gathering</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <!-- Messages will be added here -->
        </div>
        
        <div style="padding: 20px;">
            <button class="restart-btn" onclick="restartDemo()">🔄 Restart Demo</button>
        </div>
    </div>

    <script>
        // Load the plumbing service tree data
        const serviceTree = {
            "category": "Plumbing",
            "version": "2025-08-12",
            "templates": {
                "faucetRepairReplace": {
                    "question": "What specific problem with the faucet?",
                    "type": "single-select",
                    "options": [
                        "Install Customer Supplied",
                        "Replace",
                        {
                            "label": "Repair",
                            "children": [
                                {
                                    "question": "Did we install or have we repaired the faucet?",
                                    "type": "single-select",
                                    "options": [
                                        {
                                            "label": "Yes, installed",
                                            "children": [
                                                {
                                                    "question": "How recently did we install the faucet?",
                                                    "type": "single-select",
                                                    "options": [
                                                        "30 days or less",
                                                        "4 years or less",
                                                        "More than 4 years"
                                                    ]
                                                }
                                            ]
                                        },
                                        {
                                            "label": "Yes, repaired",
                                            "children": [
                                                {
                                                    "question": "How recently did we repair the faucet?",
                                                    "type": "single-select",
                                                    "options": [
                                                        "30 days or less",
                                                        "2 years or less",
                                                        "More than 2 years"
                                                    ]
                                                }
                                            ]
                                        },
                                        "No"
                                    ]
                                }
                            ]
                        }
                    ]
                },
                "stoppage": {
                    "question": "Have we helped you with this stoppage before?",
                    "type": "single-select",
                    "options": [
                        {
                            "label": "Yes",
                            "children": [
                                {
                                    "question": "How recently did we assist with the stoppage?",
                                    "type": "single-select",
                                    "options": [
                                        "30 days or less",
                                        "6 months or less",
                                        "More than 6 months"
                                    ]
                                }
                            ]
                        },
                        "No"
                    ]
                }
            },
            "branches": [
                { "id": "faucet-fixture-repair-replace", "label": "Faucet (Fixture) Repair/Replace", "flowTemplate": "faucetRepairReplace" },
                { "id": "garbage-disposal-repair-replace", "label": "Garbage Disposal Repair/Replace" },
                { "id": "gas-leak-test-new-gas-line", "label": "Gas Leak / Gas Test / New Gas Line" },
                { "id": "pipe-repair-replace", "label": "Pipe Repair/Replace" },
                { "id": "sewer-repair-replace", "label": "Sewer Repair Replace" },
                { "id": "stoppage", "label": "Stoppage", "flowTemplate": "stoppage" },
                { "id": "toilet-repair-replace", "label": "Toilet Repair/Replace" },
                { "id": "water-filtration-softener", "label": "Water Filtration/Softener" },
                { "id": "water-heater-maintenance-flush", "label": "Water Heater Maintenance/Flush" },
                { "id": "water-heater-repair", "label": "Water Heater Repair" },
                { "id": "water-heater-replace", "label": "Water Heater Replace" },
                { "id": "water-leak", "label": "Water Leak" },
                { "id": "water-pressure", "label": "Water Pressure" },
                { "id": "whole-home-plumbing-inspection", "label": "Whole Home Plumbing Inspection" }
            ]
        };

        // Demo state
        let currentFlow = null;
        let currentStep = 0;
        let customerData = {};
        let conversationHistory = [];

        // Initialize demo
        function initDemo() {
            addMessage("agent", "👋 Hello! Welcome to our plumbing services. I'm here to help you find the right service for your needs and gather some information to better assist you.");
            addMessage("agent", "What type of plumbing service do you need today?");
            showServiceOptions();
            updateProgress(10);
        }

        function addMessage(type, content, options = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            let messageContent = `<div>${content}</div>`;
            
            if (options) {
                messageContent += '<div class="options">';
                options.forEach((option, index) => {
                    const label = typeof option === 'string' ? option : option.label;
                    messageContent += `<button class="option-button" onclick="selectOption(${index})">${label}</button>`;
                });
                messageContent += '</div>';
            }
            
            messageDiv.innerHTML = messageContent;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showServiceOptions() {
            const options = serviceTree.branches.map(branch => branch.label);
            addMessage("agent", "", options);
        }

        function selectOption(optionIndex) {
            // Hide all option buttons
            const buttons = document.querySelectorAll('.option-button');
            buttons.forEach(btn => btn.style.display = 'none');
            
            if (currentFlow === null) {
                // First selection - service type
                const selectedService = serviceTree.branches[optionIndex];
                addMessage("user", selectedService.label);
                customerData.serviceType = selectedService.label;
                customerData.serviceId = selectedService.id;
                
                addMessage("agent", `Great choice! You've selected ${selectedService.label}. Let me ask you a few questions to better understand your needs.`);
                
                if (selectedService.flowTemplate) {
                    currentFlow = serviceTree.templates[selectedService.flowTemplate];
                    currentStep = 0;
                    askNextQuestion();
                } else {
                    // Simple service without complex flow
                    gatherBasicInfo();
                }
                updateProgress(30);
            } else {
                // Following the flow
                const currentQuestion = getCurrentQuestion();
                const selectedOption = currentQuestion.options[optionIndex];
                const selectedLabel = typeof selectedOption === 'string' ? selectedOption : selectedOption.label;
                
                addMessage("user", selectedLabel);
                
                // Store the answer
                customerData[`step_${currentStep}`] = selectedLabel;
                
                if (typeof selectedOption === 'object' && selectedOption.children) {
                    // Follow the child flow
                    currentFlow = { question: selectedOption.children[0].question, options: selectedOption.children[0].options };
                    currentStep++;
                    askNextQuestion();
                    updateProgress(50 + currentStep * 10);
                } else {
                    // End of flow
                    completeFlow();
                }
            }
        }

        function getCurrentQuestion() {
            return currentFlow;
        }

        function askNextQuestion() {
            const question = getCurrentQuestion();
            addMessage("agent", question.question, question.options);
        }

        function gatherBasicInfo() {
            addMessage("agent", "Perfect! Let me gather some basic information to help you better.");
            
            // Simulate gathering contact info
            setTimeout(() => {
                customerData.contactInfo = "Contact information collected";
                addMessage("agent", "Could you provide your contact information so we can schedule a service visit?");
                
                setTimeout(() => {
                    addMessage("user", "Sure, here's my contact info: (555) 123-4567, john@email.com");
                    customerData.phone = "(555) 123-4567";
                    customerData.email = "john@email.com";
                    completeFlow();
                }, 1500);
            }, 1000);
        }

        function completeFlow() {
            updateProgress(100);
            addMessage("agent", "Thank you! I've gathered all the information I need. Here's a summary:");
            showCustomerSummary();
            
            setTimeout(() => {
                addMessage("agent", "🎉 Great! We'll have one of our expert technicians contact you within 24 hours to schedule your service. Is there anything else I can help you with today?");
                
                const finalOptions = ["Schedule another service", "I'm all set, thank you!"];
                addMessage("agent", "", finalOptions.map(opt => ({ label: opt, action: opt === "Schedule another service" ? "restart" : "end" })));
            }, 2000);
        }

        function showCustomerSummary() {
            const chatContainer = document.getElementById('chatContainer');
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'customer-info';
            
            let summaryContent = '<h4>📋 Service Request Summary</h4>';
            
            for (const [key, value] of Object.entries(customerData)) {
                if (value) {
                    const displayKey = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                    summaryContent += `<div class="info-item"><strong>${displayKey}:</strong> ${value}</div>`;
                }
            }
            
            summaryDiv.innerHTML = summaryContent;
            chatContainer.appendChild(summaryDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateProgress(percentage) {
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        function restartDemo() {
            document.getElementById('chatContainer').innerHTML = '';
            currentFlow = null;
            currentStep = 0;
            customerData = {};
            conversationHistory = [];
            updateProgress(0);
            initDemo();
        }

        // Start the demo when page loads
        window.onload = function() {
            initDemo();
        };
    </script>
</body>
</html>
